<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Practice | PrepWise AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" data-name="vs/editor/editor.main"
        href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --primary:#6366f1; --primary-dark:#4f46e5;
      --bg:#f1f5f9; --surface:#fff; --border:#e2e8f0;
      --text:#0f172a; --muted:#64748b;
      --success:#10b981; --error:#ef4444; --warn:#f59e0b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

    /* Header */
    .hdr {
      background:#0f172a; color:#fff; height:56px; padding:0 24px;
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0; z-index:200;
    }
    .hdr-brand { font-size:17px; font-weight:700; }
    .hdr-brand span { color:#f59e0b; }
    .back-btn {
      display:flex; align-items:center; gap:6px; color:#94a3b8;
      text-decoration:none; font-size:13px; font-weight:500;
      padding:7px 14px; border-radius:8px; transition:.15s;
    }
    .back-btn:hover { background:rgba(255,255,255,.08); color:#fff; }
    .hdr-user { font-size:13px; color:#64748b; font-weight:500; }

    /* Buttons */
    .btn {
      display:inline-flex; align-items:center; gap:6px; padding:9px 18px;
      background:var(--primary); color:#fff; border:none; border-radius:8px;
      font-size:13px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer; transition:.2s;
    }
    .btn:hover { background:var(--primary-dark); }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn-ghost { background:transparent; color:var(--primary); border:1.5px solid var(--primary); }
    .btn-ghost:hover { background:rgba(99,102,241,.06); }
    .btn-sm { padding:6px 14px; font-size:12px; }
    .btn-success { background:var(--success); }
    .btn-success:hover { background:#059669; }

    /* ─── PROBLEM LIST ─── */
    #list-view { flex:1; padding:24px; max-width:1100px; margin:0 auto; width:100%; }

    .filters {
      display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; align-items:center;
    }
    select {
      padding:9px 14px; border:1.5px solid var(--border); border-radius:8px;
      font-size:13px; font-family:'Inter',sans-serif; color:var(--text); background:var(--surface);
      outline:none; cursor:pointer;
    }
    select:focus { border-color:var(--primary); }

    .problems-table { width:100%; border-collapse:collapse; background:var(--surface); border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); }
    .problems-table th { padding:12px 16px; text-align:left; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; background:#f8fafc; border-bottom:1px solid var(--border); }
    .problems-table td { padding:14px 16px; font-size:14px; border-bottom:1px solid #f1f5f9; }
    .problems-table tr:last-child td { border-bottom:none; }
    .problems-table tr:hover td { background:#fafbff; }

    .badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; }
    .badge-easy   { background:rgba(16,185,129,.12); color:#059669; }
    .badge-medium { background:rgba(245,158,11,.12); color:#d97706; }
    .badge-hard   { background:rgba(239,68,68,.12);  color:#dc2626; }
    .badge-solved { background:rgba(16,185,129,.12); color:#059669; }

    .topic-tag { display:inline-block; padding:2px 8px; border-radius:6px; background:#f1f5f9; color:var(--muted); font-size:11px; margin-right:4px; }

    .pagination { display:flex; align-items:center; gap:12px; margin-top:20px; justify-content:space-between; }
    .pagination .info { font-size:13px; color:var(--muted); }

    /* ─── PROBLEM SOLVER ─── */
    #solver-view { display:none; flex:1; flex-direction:column; }
    .solver-hdr {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:12px 24px; display:flex; align-items:center; gap:16px;
    }
    .solver-hdr h2 { font-size:16px; font-weight:700; flex:1; }
    .solver-timer { font-size:13px; font-weight:600; color:var(--primary); }

    .solver-body { display:flex; flex:1; overflow:hidden; }

    /* Description panel */
    .desc-panel {
      width:42%; border-right:1px solid var(--border); overflow-y:auto;
      padding:24px; background:var(--surface);
    }
    .desc-panel h3 { font-size:14px; font-weight:700; margin-bottom:12px; }
    .problem-body { font-size:13px; line-height:1.8; color:#374151; }
    .problem-body code { background:#f1f5f9; padding:1px 6px; border-radius:4px; font-size:12px; }
    .problem-body pre { background:#1e293b; color:#e2e8f0; padding:12px; border-radius:8px; overflow-x:auto; font-size:12px; margin:8px 0; }
    .tc-box { background:#f8fafc; border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:8px; font-size:12px; font-family:monospace; }
    details summary { font-size:13px; font-weight:600; cursor:pointer; padding:8px 0; color:var(--muted); }
    details summary:hover { color:var(--text); }

    /* Editor panel */
    .editor-panel { flex:1; display:flex; flex-direction:column; background:#1e1e1e; }
    .editor-toolbar {
      display:flex; align-items:center; gap:12px; padding:10px 16px;
      background:#2d2d2d; border-bottom:1px solid #3d3d3d;
    }
    .lang-select { padding:6px 12px; background:#1e1e1e; color:#e2e8f0; border:1px solid #3d3d3d; border-radius:6px; font-size:13px; font-family:'Inter',sans-serif; cursor:pointer; }
    #monaco-container { flex:1; min-height:0; }

    /* Test results */
    .test-panel { background:#1e1e1e; border-top:1px solid #3d3d3d; max-height:240px; overflow-y:auto; }
    .test-panel-hdr { display:flex; align-items:center; gap:12px; padding:10px 16px; background:#2d2d2d; border-bottom:1px solid #3d3d3d; }
    .test-panel-hdr span { font-size:13px; font-weight:600; color:#e2e8f0; }
    .tc-result {
      padding:10px 16px; border-bottom:1px solid #2d2d2d; font-size:12px; font-family:monospace; color:#94a3b8;
    }
    .tc-result.pass { border-left:3px solid #10b981; }
    .tc-result.fail { border-left:3px solid #ef4444; }
    .tc-result .tc-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
    .tc-result .tc-status { font-size:11px; font-weight:600; padding:1px 8px; border-radius:4px; }
    .tc-result.pass .tc-status { background:rgba(16,185,129,.15); color:#10b981; }
    .tc-result.fail .tc-status { background:rgba(239,68,68,.15);  color:#ef4444; }

    /* Loading */
    .spinner { width:20px; height:20px; border:3px solid rgba(255,255,255,.2); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }

    .loading-row { padding:40px; text-align:center; color:var(--muted); }
  </style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="hdr-brand">Prep<span>Wise</span> AI — DSA Practice</div>
  <div style="display:flex;align-items:center;gap:20px">
    <span class="hdr-user" id="hdr-user"></span>
    <a href="studentdashboard.html" class="back-btn">← Dashboard</a>
  </div>
</div>

<!-- ═══════════════════════ PROBLEM LIST VIEW ═══════════════════════ -->
<div id="list-view">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <h1 style="font-size:20px;font-weight:700">Coding Problems</h1>
    <button class="btn btn-ghost btn-sm" id="perf-btn">📊 My Performance</button>
  </div>

  <div class="filters">
    <select id="diff-filter"><option value="">All Difficulties</option></select>
    <select id="topic-filter"><option value="">All Topics</option></select>
    <span id="filter-count" style="font-size:13px;color:var(--muted)"></span>
  </div>

  <table class="problems-table">
    <thead>
      <tr>
        <th>#</th><th>Title</th><th>Difficulty</th><th>Topics</th><th>Status</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="problems-body">
      <tr><td colspan="6" class="loading-row">Loading problems…</td></tr>
    </tbody>
  </table>

  <div class="pagination">
    <span class="info" id="page-info"></span>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" id="prev-page-btn" disabled>← Prev</button>
      <button class="btn btn-ghost btn-sm" id="next-page-btn" disabled>Next →</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════ SOLVER VIEW ═══════════════════════ -->
<div id="solver-view">
  <div class="solver-hdr">
    <button class="btn btn-ghost btn-sm" id="back-to-list">← Problems</button>
    <h2 id="prob-title">Problem</h2>
    <span id="diff-badge"></span>
    <div style="flex:1"></div>
    <span class="solver-timer" id="solver-timer">00:00</span>
    <button class="btn btn-sm" id="run-btn">▶ Run Tests</button>
    <button class="btn btn-success btn-sm" id="submit-btn" disabled>✓ Submit</button>
  </div>

  <div class="solver-body">
    <!-- Description -->
    <div class="desc-panel">
      <h3>Problem Description</h3>
      <div class="problem-body" id="prob-body"></div>

      <details style="margin-top:16px">
        <summary>🧪 Test Cases (<span id="tc-count">0</span>)</summary>
        <div id="tc-examples" style="margin-top:8px"></div>
      </details>

      <details style="margin-top:8px" id="hints-details">
        <summary>💡 Hints</summary>
        <div id="hints-container" style="margin-top:8px;font-size:13px;color:var(--muted);line-height:1.7"></div>
      </details>

      <details style="margin-top:8px">
        <summary>📌 Topics</summary>
        <div id="topics-container" style="margin-top:8px"></div>
      </details>
    </div>

    <!-- Editor -->
    <div class="editor-panel">
      <div class="editor-toolbar">
        <select class="lang-select" id="lang-select">
          <option>Python</option><option>Java</option><option>C</option><option>C++</option>
        </select>
        <span style="color:#94a3b8;font-size:12px;flex:1" id="lang-note"></span>
      </div>
      <div id="monaco-container"></div>

      <div class="test-panel">
        <div class="test-panel-hdr">
          <span>Test Results</span>
          <span id="test-summary" style="font-size:12px;color:#64748b"></span>
        </div>
        <div id="test-results-container">
          <div style="padding:16px;color:#64748b;font-size:12px">Run tests to see results here.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Monaco loader -->
<script>var require = { paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } };</script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>

<script>
// Data endpoints (problems, stats, performance) are served by Node.js — instant.
// Only code execution (/api/dsa/execute) hits Render, warmed up lazily on first Run.
let API = '';
const configReady = fetch('/config').then(r => r.json()).then(c => { API = c.pythonApiUrl || ''; }).catch(() => {});

let executorReady = null;
function warmExecutor() {
  if (executorReady) return executorReady;
  executorReady = (async () => {
    await configReady;
    if (!API) return;
    for (let i = 0; i < 12; i++) {
      try { const r = await fetch(`${API}/`, { signal: AbortSignal.timeout(8000) }); if (r.ok) return; } catch {}
    }
  })();
  return executorReady;
}

const sd  = JSON.parse(localStorage.getItem('studentData') || '{}');
const username = new URLSearchParams(location.search).get('username') || sd.username || '';
document.getElementById('hdr-user').textContent = username ? `👤 ${username}` : '';

let editor = null;
let currentProblem = null;
let userStats = {};
let solverTimerInterval = null;
let solverStartTime = null;
let pageState = { page: 1, difficulty: '', topic: '', total: 0 };

// ── Init ──
require(['vs/editor/editor.main'], () => {
  editor = monaco.editor.create(document.getElementById('monaco-container'), {
    value: '', language: 'python', theme: 'vs-dark',
    fontSize: 14, minimap: { enabled: false },
    scrollBeyondLastLine: false, automaticLayout: true,
    fontFamily: "'JetBrains Mono', 'Fira Code', Consolas, monospace",
  });
});

// Load solved status from localStorage immediately (instant, no server needed)
function loadCachedStats() {
  if (!username) return;
  try {
    const cached = localStorage.getItem('dsa_stats_' + username);
    if (cached) { userStats = JSON.parse(cached); }
  } catch {}
}

loadCachedStats();

loadFilters();
loadProblems();

if (username) loadStats().then(() => {
  const autoQid = parseInt(new URLSearchParams(location.search).get('qid'));
  if (autoQid) openProblem(autoQid);
});

// ── Performance tab ──
document.getElementById('perf-btn').addEventListener('click', () => {
  const u = username ? '?username=' + encodeURIComponent(username) : '';
  window.location.href = 'dsa-performance.html' + u;
});

// ── Load filters ──
async function loadFilters() {
  const [diffs, topics] = await Promise.all([
    fetch(`/api/dsa/difficulties`).then(r => r.json()),
    fetch(`/api/dsa/topics`).then(r => r.json()),
  ]);
  const ds = document.getElementById('diff-filter');
  diffs.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; ds.appendChild(o); });
  const ts = document.getElementById('topic-filter');
  topics.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; ts.appendChild(o); });

  ds.addEventListener('change', () => { pageState.page = 1; pageState.difficulty = ds.value; loadProblems(); });
  ts.addEventListener('change', () => { pageState.page = 1; pageState.topic = ts.value; loadProblems(); });
}

// ── Load problems ──
async function loadProblems() {
  const tbody = document.getElementById('problems-body');
  tbody.innerHTML = '<tr><td colspan="6" class="loading-row">Loading…</td></tr>';

  const params = new URLSearchParams({
    page: pageState.page,
    difficulty: pageState.difficulty,
    topic: pageState.topic,
    page_size: 25,
  });
  const data = await fetch(`/api/dsa/problems?${params}`).then(r => r.json());
  pageState.total = data.total;

  tbody.innerHTML = '';
  const offset = (data.page - 1) * data.page_size;
  data.problems.forEach((p, i) => {
    const sub = userStats[p.qid];
    const solved = sub?.status === 'submitted';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--muted)">${offset + i + 1}</td>
      <td style="font-weight:500">${p.title}</td>
      <td><span class="badge badge-${p.difficulty.toLowerCase()}">${p.difficulty}</span></td>
      <td>${p.topics.slice(0,3).map(t => `<span class="topic-tag">${t}</span>`).join('')}</td>
      <td>${solved ? '<span class="badge badge-solved">✓ Solved</span>' : '<span style="color:var(--muted);font-size:12px">—</span>'}</td>
      <td><button class="btn btn-sm" onclick="openProblem(${p.qid})">Solve →</button></td>`;
    tbody.appendChild(tr);
  });

  if (!data.problems.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="loading-row">No problems match the selected filters.</td></tr>';
  }

  const totalPages = Math.max(1, Math.ceil(pageState.total / 25));
  document.getElementById('page-info').textContent = `${pageState.total} problems — Page ${pageState.page} of ${totalPages}`;
  document.getElementById('prev-page-btn').disabled = pageState.page <= 1;
  document.getElementById('next-page-btn').disabled = pageState.page >= totalPages;
  document.getElementById('filter-count').textContent = `Showing ${data.problems.length} of ${pageState.total}`;
}

async function loadStats() {
  try {
    const res = await fetch(`/api/dsa/stats/${username}`);
    if (!res.ok) throw new Error('Not ok');
    const serverStats = await res.json();
    userStats = { ...userStats, ...serverStats };
    localStorage.setItem('dsa_stats_' + username, JSON.stringify(userStats));
    loadProblems();
  } catch { /* fall back to local cache */ }
}

document.getElementById('prev-page-btn').addEventListener('click', () => { pageState.page--; loadProblems(); });
document.getElementById('next-page-btn').addEventListener('click', () => { pageState.page++; loadProblems(); });

// ── Open problem ──
async function openProblem(qid) {
  document.getElementById('list-view').style.display   = 'none';
  document.getElementById('solver-view').style.display = 'flex';
  document.getElementById('prob-body').innerHTML = '<p style="color:#64748b">Loading…</p>';

  const p = await fetch(`/api/dsa/problem/${qid}`).then(r => r.json());
  currentProblem = p;

  document.getElementById('prob-title').textContent = p.title;
  const diffColors = { Easy: '#10b981', Medium: '#f59e0b', Hard: '#ef4444' };
  document.getElementById('diff-badge').innerHTML =
    `<span style="background:${diffColors[p.difficulty] || '#6b7280'}20;color:${diffColors[p.difficulty] || '#6b7280'};padding:2px 12px;border-radius:20px;font-size:12px;font-weight:600">${p.difficulty}</span>`;

  document.getElementById('prob-body').innerHTML = p.body_html || '<p>No description available.</p>';

  const tcDiv = document.getElementById('tc-examples');
  tcDiv.innerHTML = '';
  document.getElementById('tc-count').textContent = p.test_cases.length;
  p.test_cases.forEach((tc, i) => {
    tcDiv.innerHTML += `<div class="tc-box">
      <div><strong>Input:</strong>  ${tc.input}</div>
      <div><strong>Output:</strong> ${tc.output}</div></div>`;
  });

  const hintsDiv = document.getElementById('hints-container');
  hintsDiv.innerHTML = '';
  if (p.hints.length) {
    p.hints.forEach(h => { hintsDiv.innerHTML += `<div style="margin-bottom:6px">• ${h}</div>`; });
    document.getElementById('hints-details').style.display = '';
  } else {
    document.getElementById('hints-details').style.display = 'none';
  }

  document.getElementById('topics-container').innerHTML = p.topics.map(t => `<span class="topic-tag" style="margin-bottom:4px">${t}</span>`).join('');

  // Set template code
  setEditorLanguage('Python');
  document.getElementById('lang-select').value = 'Python';

  // Timer
  clearInterval(solverTimerInterval);
  solverStartTime = Date.now();
  solverTimerInterval = setInterval(() => {
    const e = Math.floor((Date.now() - solverStartTime) / 1000);
    document.getElementById('solver-timer').textContent =
      `${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
  }, 1000);

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('test-results-container').innerHTML = '<div style="padding:16px;color:#64748b;font-size:12px">Run tests to see results here.</div>';
  document.getElementById('test-summary').textContent = '';
}

document.getElementById('lang-select').addEventListener('change', e => setEditorLanguage(e.target.value));

function setEditorLanguage(lang) {
  if (!editor || !currentProblem) return;
  const template = currentProblem.templates[lang] || '';
  editor.setValue(template);
  const monacoLang = { Python:'python', Java:'java', C:'c', 'C++':'cpp' }[lang] || 'python';
  monaco.editor.setModelLanguage(editor.getModel(), monacoLang);

  const notes = { Java: '⚠ Java requires javac installed', C: '⚠ C requires gcc installed', 'C++': '⚠ C++ requires g++ installed' };
  document.getElementById('lang-note').textContent = notes[lang] || 'Python execution is fully supported.';
}

document.getElementById('back-to-list').addEventListener('click', () => {
  clearInterval(solverTimerInterval);
  document.getElementById('solver-view').style.display = 'none';
  document.getElementById('list-view').style.display   = '';
  loadProblems(); // refresh solved status
});

// ── Run tests ──
document.getElementById('run-btn').addEventListener('click', async () => {
  if (!currentProblem || !editor) return;
  const btn = document.getElementById('run-btn');
  btn.innerHTML = '<div class="spinner"></div> Running…'; btn.disabled = true;

  const code = editor.getValue();
  const lang = document.getElementById('lang-select').value;
  const tcs  = currentProblem.test_cases;

  if (!tcs.length) {
    document.getElementById('test-results-container').innerHTML =
      '<div style="padding:16px;color:#94a3b8;font-size:12px">No auto-verifiable test cases. Test your solution manually.</div>';
    btn.textContent = '▶ Run Tests'; btn.disabled = false;
    return;
  }

  // Wake the executor (Render free tier cold start ~50s on first call)
  await warmExecutor();

  try {
    const data = await fetch(`${API}/api/dsa/execute`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, language: lang, test_cases: tcs }),
    }).then(r => r.json());

    renderTestResults(data.results);

    const allPassed = data.results.every(r => r.passed);
    document.getElementById('submit-btn').disabled = !allPassed;
    if (allPassed) autoSubmit(code, lang);

  } catch (e) {
    document.getElementById('test-results-container').innerHTML =
      `<div style="padding:16px;color:#ef4444;font-size:12px">Error running tests: ${e.message}</div>`;
  }

  btn.textContent = '▶ Run Tests'; btn.disabled = false;
});

function renderTestResults(results) {
  const container = document.getElementById('test-results-container');
  container.innerHTML = '';
  const passed = results.filter(r => r.passed).length;
  document.getElementById('test-summary').textContent = `${passed}/${results.length} passed`;

  results.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'tc-result ' + (r.passed ? 'pass' : 'fail');
    div.innerHTML = `
      <div class="tc-header">
        <span style="color:#e2e8f0;font-weight:600">Test ${i + 1}</span>
        <span class="tc-status">${r.passed ? '✓ PASS' : r.is_error ? '✗ ERROR' : '✗ FAIL'}</span>
      </div>
      <div>Input: ${r.input}</div>
      <div>Expected: ${r.expected}</div>
      <div style="color:${r.passed ? '#10b981' : '#ef4444'}">Got: ${r.actual}</div>`;
    container.appendChild(div);
  });
}

async function autoSubmit(code, lang) {
  if (!username || !currentProblem) return;

  // Stop timer immediately
  clearInterval(solverTimerInterval);
  const elapsed = Math.floor((Date.now() - solverStartTime) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');

  // Mark as solved locally and persist to localStorage immediately
  userStats[currentProblem.qid] = { status: 'submitted', time_taken: `${m}:${s}`, language: lang };
  try { localStorage.setItem('dsa_stats_' + username, JSON.stringify(userStats)); } catch {}

  // Fire-and-forget API call — don't block navigation on it
  fetch(`/api/dsa/submit`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username, qid: currentProblem.qid,
      difficulty: currentProblem.difficulty,
      topics: currentProblem.topics,
      language: lang, time_taken: `${m}:${s}`,
    }),
  }).catch(() => {});

  // Navigate back to problem list with solved badge updated
  document.getElementById('solver-view').style.display = 'none';
  document.getElementById('list-view').style.display   = '';
  loadProblems();
}

document.getElementById('submit-btn').addEventListener('click', async () => {
  await autoSubmit(editor.getValue(), document.getElementById('lang-select').value);
});

lucide.createIcons();
</script>
</body>
</html>
